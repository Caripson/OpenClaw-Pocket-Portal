<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Viewer · Pocket Portal</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .viewerWrap{height:calc(100vh - 64px);display:flex;flex-direction:column;gap:10px}
    model-viewer{width:100%;height:100%;background:#0f1620;border:1px solid #223;border-radius:14px}
    .hint{color:var(--muted);font-size:12px;line-height:1.4}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap}
  </style>
  <!-- model-viewer web component -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
</head>
<body>
  <header>
    <a href="/" class="badge" id="backLink">← Rooms</a>
    <h1 id="title">3D Viewer</h1>
    <span class="badge" id="meta">glb/gltf</span>
  </header>

  <div class="container viewerWrap">
    <div class="card" style="margin:0">
      <div class="btnRow">
        <a class="badge" id="openRaw" href="#" target="_blank" rel="noreferrer">Open raw file</a>
        <a class="badge" id="reload" href="#">Reload</a>
      </div>
      <div class="hint" id="hint">Tip: GLB works best (single file). Plain .gltf may reference external .bin/textures which must be reachable.</div>
    </div>

    <model-viewer id="mv"
      src=""
      camera-controls
      touch-action="pan-y"
      shadow-intensity="0.8"
      exposure="1"
      environment-image="neutral"
      autoplay
      auto-rotate
      rotation-per-second="20deg"
      loading="lazy"
      alt="3D model">
    </model-viewer>
  </div>

<script type="module">
import { loadI18n } from '/static/app.js';

const { t } = await loadI18n();

document.title = `3D Viewer · ${t('app.title')}`;

document.getElementById('title').textContent = t('viewer.title');

document.getElementById('openRaw').textContent = t('viewer.openRaw');
document.getElementById('reload').textContent = t('viewer.reload');
document.getElementById('hint').textContent = t('viewer.hint');

const url = new URL(location.href);
const src = (url.searchParams.get('src') || '').trim();
const room = (url.searchParams.get('room') || '').trim();
const title = (url.searchParams.get('title') || '').trim();

const back = room ? `/rooms/${encodeURIComponent(room)}` : '/';
const backLink = document.getElementById('backLink');
backLink.href = back;
backLink.textContent = t('viewer.back');

if (title) {
  document.getElementById('meta').textContent = title;
}

const mv = document.getElementById('mv');
const openRaw = document.getElementById('openRaw');

if (!src) {
  mv.style.display = 'none';
  document.getElementById('hint').textContent = t('viewer.noSrc');
  openRaw.style.display = 'none';
} else {
  mv.src = src;
  openRaw.href = src;
}

// reload keeps params
const reload = document.getElementById('reload');
reload.href = location.href;
</script>
</body>
</html>
