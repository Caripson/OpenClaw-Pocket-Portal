<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pocket Portal</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Pocket Portal</h1>
    <span class="badge">LAN-only</span>
  </header>

  <div class="container">
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:700">Skapa nytt rum</div>
          <div class="muted">Projekt / ämne / demo</div>
        </div>
      </div>
      <div style="margin-top:10px" class="list">
        <input id="newTitle" placeholder="t.ex. NEXTGEN-RALLY: suspension bridge" />
        <button id="createBtn" class="primary">Skapa rum</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:700">Rum</div>
          <div class="muted" id="roomsMeta">Laddar…</div>
        </div>
        <button id="refreshBtn" class="ghost">Uppdatera</button>
      </div>
      <hr />
      <div id="rooms" class="list"></div>
    </div>

    <div class="footer">v0.1 · Local-first · Johan + Moneypenny</div>
  </div>

<script>
async function api(path, opts={}) {
  const res = await fetch(path, { headers: { 'content-type': 'application/json' }, ...opts });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function elRoom(r) {
  const a = document.createElement('a');
  a.href = `/rooms/${r.id}`;
  a.className = 'card';
  a.style.display = 'block';
  a.innerHTML = `
    <div class="row">
      <div>
        <div style="font-weight:700">${escapeHtml(r.title)}</div>
        <div class="muted">Uppdaterad: ${new Date(r.updated_at).toLocaleString()}</div>
      </div>
      <div class="badge">Öppna</div>
    </div>
  `;
  return a;
}

function escapeHtml(s){
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

async function loadRooms() {
  const out = await api('/api/rooms');
  const rooms = out.rooms || [];
  const wrap = document.getElementById('rooms');
  wrap.innerHTML = '';
  for (const r of rooms) wrap.appendChild(elRoom(r));
  document.getElementById('roomsMeta').textContent = `${rooms.length} st`;
}

document.getElementById('refreshBtn').addEventListener('click', loadRooms);

document.getElementById('createBtn').addEventListener('click', async () => {
  const titleEl = document.getElementById('newTitle');
  const title = titleEl.value.trim();
  if (!title) return;
  const out = await api('/api/rooms', { method: 'POST', body: JSON.stringify({ title }) });
  titleEl.value = '';
  location.href = `/rooms/${out.id}`;
});

loadRooms();
</script>
</body>
</html>
