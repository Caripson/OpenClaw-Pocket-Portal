<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pocket Portal</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1 id="appTitle">Pocket Portal</h1>
    <span class="badge" id="lanBadge">LAN-only</span>
  </header>

  <div class="container">
    <div class="card">
      <div class="row">
        <div>
          <div id="newRoomTitle" style="font-weight:700">Create room</div>
          <div class="muted" id="newRoomSubtitle">Project / topic / demo</div>
        </div>
      </div>
      <div style="margin-top:10px" class="list">
        <input id="newTitle" placeholder="e.g. NEXTGEN-RALLY — suspension bridge" />
        <button id="createBtn" class="primary">Create</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div id="roomsTitle" style="font-weight:700">Rooms</div>
          <div class="muted" id="roomsMeta">Loading…</div>
        </div>
        <button id="refreshBtn" class="ghost">Refresh</button>
      </div>
      <hr />
      <div id="rooms" class="list"></div>
    </div>

    <div class="footer">v0.1 · Local-first · Johan + Moneypenny</div>
  </div>

<script type="module">
import { loadI18n, api, escapeHtml } from '/static/app.js';

const { t } = await loadI18n();

// translate static bits

document.title = t('app.title');
document.documentElement.lang = 'en';

document.getElementById('appTitle').textContent = t('app.title');
document.getElementById('lanBadge').textContent = t('badge.lanOnly');

document.getElementById('newRoomTitle').textContent = t('home.newRoom.title');
document.getElementById('newRoomSubtitle').textContent = t('home.newRoom.subtitle');

document.getElementById('newTitle').placeholder = t('home.newRoom.placeholder');
document.getElementById('createBtn').textContent = t('home.newRoom.button');

document.getElementById('roomsTitle').textContent = t('home.rooms.title');
document.getElementById('roomsMeta').textContent = t('home.rooms.loading');
document.getElementById('refreshBtn').textContent = t('home.rooms.refresh');

function elRoom(r) {
  const a = document.createElement('a');
  a.href = `/rooms/${r.id}`;
  a.className = 'card';
  a.style.display = 'block';
  a.innerHTML = `
    <div class="row">
      <div>
        <div style="font-weight:700">${escapeHtml(r.title)}</div>
        <div class="muted">${escapeHtml(t('home.rooms.updated', { ts: new Date(r.updated_at).toLocaleString() }))}</div>
      </div>
      <div class="badge">${escapeHtml(t('home.rooms.open'))}</div>
    </div>
  `;
  return a;
}

async function loadRooms() {
  const out = await api('/api/rooms');
  const rooms = out.rooms || [];
  const wrap = document.getElementById('rooms');
  wrap.innerHTML = '';
  for (const r of rooms) wrap.appendChild(elRoom(r));
  document.getElementById('roomsMeta').textContent = t('home.rooms.count', { count: rooms.length });
}

document.getElementById('refreshBtn').addEventListener('click', loadRooms);

document.getElementById('createBtn').addEventListener('click', async () => {
  const titleEl = document.getElementById('newTitle');
  const title = titleEl.value.trim();
  if (!title) return;
  const out = await api('/api/rooms', { method: 'POST', body: JSON.stringify({ title }) });
  titleEl.value = '';
  location.href = `/rooms/${out.id}`;
});

loadRooms();
</script>
</body>
</html>
